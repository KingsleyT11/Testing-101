{% extends 'base.html' %}
{% block content %}
<section>
  <h2>Customers</h2>
  <form method="post" action="/customers" class="card">
    <div>
      <label>Name</label>
      <input type="text" name="name" required />
    </div>
    <div>
      <label>Email</label>
      <input type="email" name="email" />
    </div>
    <div>
      <label>Phone</label>
      <input type="text" name="phone" />
    </div>
    <button type="submit">Add Customer</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Created</th>
      </tr>
    </thead>
    <tbody>
      {% for c in customers %}
      <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.email or '-' }}</td>
        <td>{{ c.phone or '-' }}</td>
        <td>{{ c.created_at.strftime('%Y-%m-%d') }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
